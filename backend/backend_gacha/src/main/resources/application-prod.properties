# SPRING_PROFILES_ACTIVE=prod 로 활성화되는 운영 전용 설정. deploy/backend.env.example 참고.
# DB_URL/DB_USERNAME/DB_PASSWORD/JWT_SECRET/GOOGLE_CLIENT_ID/CORS_ALLOWED_ORIGINS는
# application.properties와 동일하게 환경변수로 주입한다(여기 값은 개발과 다르게 둘 것만 override).

# API 에러 응답에 스택트레이스/내부 메시지를 노출하지 않는다
server.error.include-stacktrace=never
server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-exception=false

# 뷰 렌더링 중 지연 로딩 쿼리가 추가로 나가는 것을 방지 (이 프로젝트는 애초에 지연 연관관계를
# 쓰지 않고 항상 명시적으로 배치 조회하는 컨벤션이라 꺼도 영향 없음)
spring.jpa.open-in-view=false

# 쿼리/파라미터 로그를 켜지 않는다(기본값이지만 명시)
spring.jpa.show-sql=false
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.orm.jdbc.bind=WARN
logging.level.root=INFO

# 로드밸런서/모니터링용 헬스체크만 공개하고 나머지 actuator 엔드포인트는 막는다
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
