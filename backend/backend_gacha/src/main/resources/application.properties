spring.application.name=backend_gacha

# Local override file (gitignored). Copy application-local.properties.example and fill in real values.
spring.config.import=optional:classpath:application-local.properties

# PostgreSQL Database Connection Settings
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# GOOGLE_CLIENT_ID env var is read directly by AuthController (frontend Google Sign-In -> POST /api/auth/google)

# JWT settings
jwt.secret=${JWT_SECRET}
jwt.expiration-minutes=${JWT_EXPIRATION_MINUTES:60}

# NCP Object Storage (S3 호환) — 관리자 이미지 업로드용(파트 06 Phase 2 후속)
ncp.object-storage.endpoint=${NCP_OBJECT_STORAGE_ENDPOINT:https://kr.object.ncloudstorage.com}
ncp.object-storage.region=${NCP_OBJECT_STORAGE_REGION:kr-standard}
ncp.object-storage.bucket=${NCP_OBJECT_STORAGE_BUCKET:}
ncp.object-storage.access-key=${NCP_OBJECT_STORAGE_ACCESS_KEY:}
ncp.object-storage.secret-key=${NCP_OBJECT_STORAGE_SECRET_KEY:}

# 업로드 이미지 용량 제한
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB